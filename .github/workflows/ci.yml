name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - name: Build and test packages
        run: make test-packages

  test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
      - name: Build binary
        run: go build -ldflags "-s -w" -o rrun .
      - name: Package tarball
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          ARCH=$(uname -m | sed 's/x86_64/amd64/')
          mkdir -p dist
          tar -czf dist/rrun-${VERSION}-darwin-${ARCH}.tar.gz rrun
      - name: Smoketest installed package
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          ARCH=$(uname -m | sed 's/x86_64/amd64/')
          INSTALL_DIR=$(mktemp -d)
          tar -xzf dist/rrun-${VERSION}-darwin-${ARCH}.tar.gz -C "$INSTALL_DIR"
          "$INSTALL_DIR/rrun" --version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rrun-macos
          path: dist/*.tar.gz

  test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
      - name: Build binary
        run: go build -ldflags "-s -w" -o rrun.exe .
      - name: Package zip
        shell: pwsh
        run: |
          $version = (git describe --tags --always --dirty 2>$null) ?? "dev"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path rrun.exe -DestinationPath "dist\rrun-$version-windows-amd64.zip"
      - name: Smoketest installed package
        shell: pwsh
        run: |
          $version = (git describe --tags --always --dirty 2>$null) ?? "dev"
          $installDir = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          New-Item -ItemType Directory -Path $installDir | Out-Null
          Expand-Archive -Path "dist\rrun-$version-windows-amd64.zip" -DestinationPath $installDir
          & "$installDir\rrun.exe" --version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rrun-windows
          path: dist/*.zip

  test-distros:
    name: Go Tests (${{ matrix.distro }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora-latest
            image: fedora:latest
            install-deps: dnf install -y git
          - distro: arch-latest
            image: archlinux:latest
            install-deps: pacman -Syu --noconfirm git
    steps:
      - name: Install system dependencies
        run: ${{ matrix.install-deps }}
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
