<svg xmlns="http://www.w3.org/2000/svg" width="400" height="115" viewBox="0 0 400 115">
  <rect width="400" height="115" rx="12" fill="#0d1117"/>

  <!-- tail feathers (extend left from body) -->
  <path d="M 50 72 Q 28 62 10 48" stroke="#7a6348" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 49 78 Q 25 73 8 67" stroke="#9b8060" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 51 68 Q 32 55 20 40" stroke="#7a6348" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="97" cy="78" rx="50" ry="20" fill="#9b8060"/>

  <!-- belly -->
  <ellipse cx="102" cy="84" rx="36" ry="11" fill="#d4c4a8"/>

  <!-- head -->
  <circle cx="140" cy="60" r="21" fill="#9b8060"/>

  <!-- crest feathers (tilt back) -->
  <line x1="129" y1="40" x2="114" y2="17" stroke="#7a6348" stroke-width="5" stroke-linecap="round"/>
  <line x1="136" y1="39" x2="124" y2="14" stroke="#7a6348" stroke-width="4" stroke-linecap="round"/>
  <line x1="143" y1="40" x2="136" y2="16" stroke="#7a6348" stroke-width="4" stroke-linecap="round"/>

  <!-- eye patch -->
  <circle cx="149" cy="55" r="9" fill="#4080d0"/>
  <!-- pupil -->
  <circle cx="151" cy="55" r="5" fill="#0d1117"/>
  <!-- highlight -->
  <circle cx="153" cy="53" r="2" fill="white"/>

  <!-- beak -->
  <path d="M 156 57 L 184 62 L 156 67 Z" fill="#e8932a"/>

  <!-- legs, running stride -->
  <line x1="93"  y1="96" x2="75"  y2="112" stroke="#e8932a" stroke-width="4" stroke-linecap="round"/>
  <line x1="75"  y1="112" x2="62" y2="112" stroke="#e8932a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="95" x2="128" y2="112" stroke="#e8932a" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="112" x2="120" y2="112" stroke="#e8932a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- motion lines between beak and wordmark -->
  <line x1="189" y1="57" x2="203" y2="57" stroke="#e8932a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="187" y1="64" x2="201" y2="64" stroke="#e8932a" stroke-width="2"   stroke-linecap="round"/>
  <line x1="189" y1="50" x2="201" y2="50" stroke="#e8932a" stroke-width="2"   stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="210" y="82"
        font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace"
        font-size="62" font-weight="bold" fill="#c9d1d9">rrun</text>
</svg>
